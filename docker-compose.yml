services:

  # PostgreSQL for Catalog Service
  catalogdb:
    image: postgres:16-alpine
    container_name: gamegaraj-catalog-postgres
    ports:
      - "5434:5432"
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=GameGarajCatalogDb

  # PostgreSQL for Review Service
  reviewdb:
    image: postgres:16-alpine
    container_name: gamegaraj-review-postgres
    ports:
      - "5435:5432"
    volumes:
      - review_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=GameGarajReviewDb

  # ============ REDIS SENTINEL CLUSTER (Basket API) ============

  # Redis Master — Yazma + Okuma yapılır
  redis-master:
    image: redis:7-alpine
    container_name: gamegaraj-redis-master
    ports:
      - "6380:6379"
    volumes:
      - redis_master_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis Replica 1 — Sadece okuma, master'dan otomatik veri çeker
  redis-replica-1:
    image: redis:7-alpine
    container_name: gamegaraj-redis-replica-1
    ports:
      - "6381:6379"
    volumes:
      - redis_replica1_data:/data
    command: redis-server --appendonly yes --replicaof redis-master 6379
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis Replica 2 — Sadece okuma, master'dan otomatik veri çeker
  redis-replica-2:
    image: redis:7-alpine
    container_name: gamegaraj-redis-replica-2
    ports:
      - "6382:6379"
    volumes:
      - redis_replica2_data:/data
    command: redis-server --appendonly yes --replicaof redis-master 6379
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis Sentinel 1 — Master'ı izler, düşerse failover tetikler
  redis-sentinel-1:
    image: redis:7-alpine
    container_name: gamegaraj-redis-sentinel-1
    ports:
      - "26379:26379"
    volumes:
      - ./config/redis/sentinel/sentinel1.conf:/etc/redis/sentinel.conf
    command: sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy

  # Redis Sentinel 2 — İkinci izleyici (quorum=2 için gerekli)
  redis-sentinel-2:
    image: redis:7-alpine
    container_name: gamegaraj-redis-sentinel-2
    ports:
      - "26380:26379"
    volumes:
      - ./config/redis/sentinel/sentinel2.conf:/etc/redis/sentinel.conf
    command: sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy

  # Redis Sentinel 3 — Üçüncü izleyici (yüksek erişilebilirlik)
  redis-sentinel-3:
    image: redis:7-alpine
    container_name: gamegaraj-redis-sentinel-3
    ports:
      - "26381:26379"
    volumes:
      - ./config/redis/sentinel/sentinel3.conf:/etc/redis/sentinel.conf
    command: sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy


  # SQL Server for Campaign API
  campaigndb:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: gamegaraj-campaign-sqlserver
    ports:
      - "1434:1433"
    volumes:
      - campaign_sqlserver_data:/var/opt/mssql
    environment:
      - ACCEPT_EULA=${ACCEPT_EULA}
      - SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=${MSSQL_PID}

  # SQL Server for Order API
  orderdb:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: gamegaraj-order-sqlserver
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    environment:
      - ACCEPT_EULA=${ACCEPT_EULA}
      - SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=${MSSQL_PID}

  # Dedicated Postgres for Keycloak (Otomatik DB Oluşturma Avantajı)
  keycloak-db:
    image: postgres:16-alpine
    container_name: gamegaraj-keycloak-postgres
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data

  # Keycloak for Identity Management
  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION}
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./config/keycloak/realm-init.json:/opt/keycloak/data/import/realm-init.json
    depends_on:
      - keycloak-db

  # RabbitMQ for Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: gamegaraj-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}

  # Elasticsearch for Search service
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: gamegaraj-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9201:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  # Kibana for viewing Elastic data
  kibana:
    image: kibana:8.13.0
    container_name: gamegaraj-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  # Jaeger for Distributed Tracing (OTLP receiver)
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: gamegaraj-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver

volumes:
  redis_master_data:
  redis_replica1_data:
  redis_replica2_data:
  sqlserver_data:
  campaign_sqlserver_data:
  keycloak_postgres_data:
  rabbitmq_data:
  catalog_postgres_data:
  review_postgres_data:
  elasticsearch_data:
  jaeger_data:
