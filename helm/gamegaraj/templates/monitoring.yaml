{{- if .Values.monitoring.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app: prometheus
    {{- include "gamegaraj.labels" $ | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-{{ .Release.Namespace }}
  labels:
    app: prometheus
    {{- include "gamegaraj.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "endpoints"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-{{ .Release.Namespace }}
  labels:
    app: prometheus
    {{- include "gamegaraj.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: {{ .Release.Namespace }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: prometheus
    {{- include "gamegaraj.labels" $ | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Scrape only pods that have prometheus.io/scrape annotation set to true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          # Respect custom path if set via prometheus.io/path
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Respect custom port if set via prometheus.io/port
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          # Add pod metadata as labels
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: app

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app: prometheus
    {{- include "gamegaraj.labels" $ | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: {{ .Values.monitoring.prometheus.image }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=3d"
            - "--enable-feature=exemplar-storage"
          ports:
            - containerPort: 9090
              name: http
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 256Mi
              cpu: 100m
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
            - name: storage-volume
              mountPath: /prometheus
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
        - name: storage-volume
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app: prometheus
    {{- include "gamegaraj.labels" $ | nindent 4 }}
spec:
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  selector:
    app: prometheus

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Release.Namespace }}
  labels:
    app: grafana
    {{- include "gamegaraj.labels" $ | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        jsonData:
          timeInterval: 15s
          queryTimeout: 30s
          exemplarTraceIdDestinations:
            - name: Jaeger
              datasourceUid: jaeger
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://192.168.1.56:16686
        uid: jaeger

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: {{ .Release.Namespace }}
  labels:
    app: grafana
    {{- include "gamegaraj.labels" $ | nindent 4 }}
data:
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: 'GameGaraj'
        orgId: 1
        folder: 'GameGaraj'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    app: grafana
    {{- include "gamegaraj.labels" $ | nindent 4 }}
data:
  service-health.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Request Rate (RPS) per Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count[1m])) by (service_name)",
              "legendFormat": "{{ "{{" }}service_name{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "pointSize": 5 }
            }
          }
        },
        {
          "title": "Latency P95 per Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket[1m])) by (le, service_name))",
              "legendFormat": "{{ "{{" }}service_name{{ "}}" }} P95",
              "exemplar": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              }
            }
          }
        },
        {
          "title": "Error Rate (5xx) per Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~\"5..\"}[1m])) by (service_name) / sum(rate(http_server_request_duration_seconds_count[1m])) by (service_name)",
              "legendFormat": "{{ "{{" }}service_name{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.03 }
                ]
              },
              "noValue": "0% (No 5xx)"
            }
          }
        },
        {
          "title": "CPU Usage per Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "rate(process_cpu_time_seconds_total[1m])",
              "legendFormat": "{{ "{{" }}service_name{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            }
          }
        },
        {
          "title": "Memory Usage per Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "process_memory_usage_bytes",
              "legendFormat": "{{ "{{" }}service_name{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "GC Collections per Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "rate(process_runtime_dotnet_gc_collections_count_total[1m])",
              "legendFormat": "{{ "{{" }}service_name{{ "}}" }} {{ "{{" }}generation{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "bars", "fillOpacity": 50 }
            }
          }
        },
        {
          "title": "ThreadPool Queue Length",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "targets": [
            {
              "expr": "process_runtime_dotnet_thread_pool_queue_length",
              "legendFormat": "{{ "{{" }}service_name{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "Active HTTP Connections",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "targets": [
            {
              "expr": "sum(http_server_active_requests) by (service_name)",
              "legendFormat": "{{ "{{" }}service_name{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["gamegaraj", "service-health"],
      "templating": { "list": [] },
      "refresh": "1s",
      "time": { "from": "now-5m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "GameGaraj - Service Health",
      "uid": "gamegaraj-service-health",
      "version": 1
    }
  business-metrics.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Counter: Sepete Eklenen Urunler (Rate)",
          "description": "Counter metrigi: rate() fonksiyonu counter'i saniye basina hiza donusturur.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "rate(basket_items_added_total[1m])",
              "legendFormat": "Sepete Ekleme/sn"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2, "gradientMode": "scheme" },
              "color": { "mode": "fixed", "fixedColor": "green" }
            }
          }
        },
        {
          "title": "Counter: Siparisler Olusturuldu (Rate)",
          "description": "Counter metrigi: Toplam siparis sayisinin saniye basina artis hizi.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "rate(orders_created_total[1m])",
              "legendFormat": "Siparis/sn"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2, "gradientMode": "scheme" },
              "color": { "mode": "fixed", "fixedColor": "blue" }
            }
          }
        },
        {
          "title": "Counter: Sepet Islemleri (Toplam)",
          "description": "Counter: increase() ile son 1 saatte kac adet islem oldugunu gosterir.",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "increase(basket_items_added_total[1h])",
              "legendFormat": "Eklenen"
            },
            {
              "expr": "increase(basket_items_removed_total[1h])",
              "legendFormat": "Cikarilan"
            },
            {
              "expr": "increase(basket_deleted_total[1h])",
              "legendFormat": "Silinen Sepet"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 5 },
                  { "color": "yellow", "value": 50 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "textMode": "value_and_name",
            "colorMode": "value"
          }
        },
        {
          "title": "Counter: Siparis Durumlari (Toplam)",
          "description": "Birden fazla counter karsilastirarak is akisinin sagligini olcebilirsiniz.",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "targets": [
            {
              "expr": "increase(orders_created_total[1h])",
              "legendFormat": "Olusturulan"
            },
            {
              "expr": "increase(orders_cancelled_total[1h])",
              "legendFormat": "Iptal Edilen"
            },
            {
              "expr": "increase(orders_completed_total[1h])",
              "legendFormat": "Tamamlanan"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 1 },
                  { "color": "orange", "value": 20 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "textMode": "value_and_name",
            "colorMode": "value"
          }
        },
        {
          "title": "Counter: Odeme Basari vs Hata",
          "description": "Iki counter'i ayni grafikte karsilastirmak sik kullanilan bir pattern.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "targets": [
            {
              "expr": "rate(payments_succeeded_total[1m])",
              "legendFormat": "Basarili"
            },
            {
              "expr": "rate(payments_failed_total[1m])",
              "legendFormat": "Basarisiz"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2 }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Basarili" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Basarisiz" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              }
            ]
          }
        },
        {
          "title": "Histogram: HTTP Istek Suresi Dagilimi (P50/P95/P99)",
          "description": "Histogram metrigi: histogram_quantile() ile yuzdelik dilimler hesaplanir.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_server_request_duration_seconds_bucket[1m])) by (le))",
              "legendFormat": "P50 (Ortanca)",
              "exemplar": true
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket[1m])) by (le))",
              "legendFormat": "P95",
              "exemplar": true
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_server_request_duration_seconds_bucket[1m])) by (le))",
              "legendFormat": "P99 (En Yavas)",
              "exemplar": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "P50 (Ortanca)" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "P95" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "yellow" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "P99 (En Yavas)" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              }
            ]
          }
        },
        {
          "title": "Gauge: Anlik Aktif Baglanti Sayisi",
          "description": "Gauge metrigi: Anlik deger gosterir, yukari-asagi gidebilir.",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "sum(http_server_active_requests) by (service_name)",
              "legendFormat": "{{ "{{" }}service_name{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 30 },
                  { "color": "red", "value": 80 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "background",
            "graphMode": "area"
          }
        },
        {
          "title": "Gauge: .NET Heap Bellek (Anlik)",
          "description": "Gauge: GC heap boyutunu anlik olarak gosterir.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 16 },
          "targets": [
            {
              "expr": "process_runtime_dotnet_gc_heap_size_bytes",
              "legendFormat": "{{ "{{" }}service_name{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "fillOpacity": 15, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "Counter: Favori Islemleri (Rate)",
          "description": "Counter: Favori ekleme ve cikarma islemlerinin hiz karsilastirmasi.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "targets": [
            {
              "expr": "rate(basket_favorites_added_total[1m])",
              "legendFormat": "Favori Eklendi"
            },
            {
              "expr": "rate(basket_favorites_removed_total[1m])",
              "legendFormat": "Favori Cikarildi"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2 }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Favori Eklendi" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "purple" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Favori Cikarildi" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }
                ]
              }
            ]
          }
        },
        {
          "title": "Counter: HTTP Istek Hizi (Status Code Bazli)",
          "description": "Label bazli filtreleme Prometheus'un en guclu ozelliklerinden biridir.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "targets": [
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~\"2..\"}[1m])) by (service_name)",
              "legendFormat": "{{ "{{" }}service_name{{ "}}" }} 2xx"
            },
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~\"4..\"}[1m])) by (service_name)",
              "legendFormat": "{{ "{{" }}service_name{{ "}}" }} 4xx"
            },
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~\"5..\"}[1m])) by (service_name)",
              "legendFormat": "{{ "{{" }}service_name{{ "}}" }} 5xx"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 15, "lineWidth": 2 }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["gamegaraj", "business-metrics"],
      "templating": { "list": [] },
      "refresh": "1s",
      "time": { "from": "now-5m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "GameGaraj - Business Metrics",
      "uid": "gamegaraj-business-metrics",
      "version": 1
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: {{ .Release.Namespace }}
  labels:
    app: grafana
    {{- include "gamegaraj.labels" $ | nindent 4 }}
data:
  alerts.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: GameGaraj - Critical Alerts
        folder: GameGaraj
        interval: 1m
        rules:
          - uid: gamegaraj-high-cpu
            title: High CPU Usage
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: rate(process_cpu_time_seconds_total[5m])
                  instant: false
                  range: true
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0.9]
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "CPU usage > 90% on {{ "{{" }} $labels.service_name {{ "}}" }}"
              description: "Service {{ "{{" }} $labels.service_name {{ "}}" }} has been running above 90% CPU for 5 minutes."

          - uid: gamegaraj-high-5xx
            title: High 5xx Error Rate
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: |
                    sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])) by (service_name)
                    / sum(rate(http_server_request_duration_seconds_count[5m])) by (service_name)
                  instant: false
                  range: true
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0.03]
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "5xx error rate > 3% on {{ "{{" }} $labels.service_name {{ "}}" }}"
              description: "Service {{ "{{" }} $labels.service_name {{ "}}" }} is returning more than 3% server errors."

          - uid: gamegaraj-high-latency
            title: High P95 Latency
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket[5m])) by (le, service_name))
                  instant: false
                  range: true
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [3]
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "P95 latency > 3s on {{ "{{" }} $labels.service_name {{ "}}" }}"
              description: "Service {{ "{{" }} $labels.service_name {{ "}}" }} P95 response time exceeded 3 seconds."

          - uid: gamegaraj-payment-failures
            title: Payment Failures Spike
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: increase(payments_failed_total[10m])
                  instant: true
                  range: false
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [10]
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "More than 10 payment failures in 10 minutes"
              description: "Payment failure count spiked — possible payment gateway issue."

          - uid: gamegaraj-email-failures
            title: Invoice Email Failures
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: increase(invoices_emails_failed_total[10m])
                  instant: true
                  range: false
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [5]
            for: 0s
            labels:
              severity: warning
            annotations:
              summary: "More than 5 invoice email failures in 10 minutes"
              description: "Invoice email delivery is failing — check SMTP configuration."

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
  labels:
    app: grafana
    {{- include "gamegaraj.labels" $ | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.monitoring.grafana.image }}
          ports:
            - containerPort: 3000
              name: http
          resources:
            limits:
              memory: 256Mi
              cpu: 300m
            requests:
              memory: 128Mi
              cpu: 50m
          volumeMounts:
            - name: datasource-volume
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provisioning-volume
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-json-volume
              mountPath: /var/lib/grafana/dashboards
            - name: alerting-volume
              mountPath: /etc/grafana/provisioning/alerting
            - name: storage-volume
              mountPath: /var/lib/grafana
      volumes:
        - name: datasource-volume
          configMap:
            name: grafana-datasources
        - name: dashboard-provisioning-volume
          configMap:
            name: grafana-dashboard-provisioning
        - name: dashboard-json-volume
          configMap:
            name: grafana-dashboards
        - name: alerting-volume
          configMap:
            name: grafana-alerting
        - name: storage-volume
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
  labels:
    app: grafana
    {{- include "gamegaraj.labels" $ | nindent 4 }}
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      nodePort: {{ .Values.monitoring.grafana.nodePort }}
  selector:
    app: grafana

{{- end }}
