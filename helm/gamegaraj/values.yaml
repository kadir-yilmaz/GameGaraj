# =============================================================================
# GameGaraj Helm Chart — values.yaml
# =============================================================================
# Infrastructure (DBs, RabbitMQ, Keycloak, Elastic, MinIO, Redis) runs on
# 192.168.1.56 via Dokploy docker-compose.  K3s pods reach them by IP.
# =============================================================================

# -- Global settings shared by all services
global:
  imagePullPolicy: IfNotPresent
  aspnetEnvironment: Production
  aspnetUrls: "http://+:8080"
  containerPort: 8080

  # Infrastructure addresses (192.168.1.56 = Dokploy host)
  rabbitmqUrl: "192.168.1.56"
  identityAuthority: "http://192.168.1.56:8080/realms/GameGaraj"
  elasticUri: "http://192.168.1.56:9201"
  otlpEndpoint: "http://192.168.1.56:4317"
  otlpSamplingRatio: "0.05"

# -- Override chart name
nameOverride: ""
# -- Override fully qualified chart name
fullnameOverride: ""

# =============================================================================
# Microservice Definitions
# =============================================================================
# Each entry generates a Deployment + NodePort Service.
# Fields:
#   image      - container image (required)
#   nodePort   - NodePort number (required)
#   replicas   - replica count (default: 1)
#   env        - plain environment variables (map)
#   secretEnv  - env vars sourced from gamegaraj-secrets (map: envName → secretKey)
#   skipCommon - if true, do NOT inject global common env vars (default: false)
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # API Gateway (YARP reverse proxy)
  # ---------------------------------------------------------------------------
  gateway:
    image: "gateway:7ba3742"
    nodePort: 30000
    env:
      # Cluster addresses — K8s service DNS + port
      ReverseProxy__Clusters__catalog-cluster__Destinations__destination1__Address: "http://catalog-api:8080"
      ReverseProxy__Clusters__basket-cluster__Destinations__destination1__Address: "http://basket-api:8080"
      ReverseProxy__Clusters__order-cluster__Destinations__destination1__Address: "http://order-api:8080"
      ReverseProxy__Clusters__review-cluster__Destinations__destination1__Address: "http://review-api:8080"
      ReverseProxy__Clusters__payment-cluster__Destinations__destination1__Address: "http://payment-api:8080"
      ReverseProxy__Clusters__photostock-cluster__Destinations__destination1__Address: "http://photostock-api:8080"
      ReverseProxy__Clusters__campaign-cluster__Destinations__destination1__Address: "http://campaign-api:8080"
      # Critical review flow routes: WebUI -> Gateway -> Review API.
      ReverseProxy__Routes__order-route__ClusterId: "order-cluster"
      ReverseProxy__Routes__order-route__Match__Path: "/api/order/{**catch-all}"
      ReverseProxy__Routes__order-route__Transforms__0__PathPattern: "/api/{**catch-all}"
      ReverseProxy__Routes__review-route__ClusterId: "review-cluster"
      ReverseProxy__Routes__review-route__Match__Path: "/api/review/{**catch-all}"
      ReverseProxy__Routes__review-route__Transforms__0__PathPattern: "/api/{**catch-all}"
      # Identity — internal address for token validation
      IdentityOption__Address: "http://192.168.1.56:8080/realms/GameGaraj"
      # Issuer must match the issuer claim in JWT tokens (public URL)
      IdentityOption__Issuer: "https://keycloak.kadiryilmaz.online/realms/GameGaraj"
      IdentityOption__Audience: "gateway.api"

  # ---------------------------------------------------------------------------
  # Catalog API (PostgreSQL)
  # ---------------------------------------------------------------------------
  catalog-api:
    image: "catalog-api:abdbb0a"
    nodePort: 30010
    skipCommonRabbit: true
    env:
      IdentityOption__Audience: "catalog.api"
    secretEnv:
      RabbitMQUrl: rabbitmq-url
      ConnectionStrings__PostgresConnection: catalog-postgres-connection
      ConnectionStrings__Redis: redis-connection

  # ---------------------------------------------------------------------------
  # Review API (PostgreSQL)
  # ---------------------------------------------------------------------------
  review-api:
    image: "review-api:37474df"
    nodePort: 30018
    skipCommonRabbit: true
    env:
      IdentityOption__Audience: "review.api"
      # Review API appends /api/ and calls orders/{userId}/owns/{productId}.
      ServiceUrls__OrderApi: "http://order-api:8080"
    secretEnv:
      ConnectionStrings__PostgresConnection: review-postgres-connection

  # ---------------------------------------------------------------------------
  # PhotoStock API (MinIO)
  # ---------------------------------------------------------------------------
  photostock-api:
    image: "photostock-api:3e73105"
    nodePort: 30015
    env:
      IdentityOption__Audience: "photostock.api"
      Minio__UseLocalStorage: "false"
    secretEnv:
      Minio__Endpoint: minio-endpoint
      Minio__AccessKey: minio-access-key
      Minio__SecretKey: minio-secret-key
      Minio__BucketName: minio-bucket-name
      Minio__Secure: minio-secure

  # ---------------------------------------------------------------------------
  # Basket API (Redis Sentinel)
  # ---------------------------------------------------------------------------
  basket-api:
    image: "basket-api:40bc7e5"
    nodePort: 30011
    env:
      IdentityOption__Audience: "basket.api"
    secretEnv:
      ConnectionStrings__Redis: redis-connection

  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Order API (SQL Server)
  # ---------------------------------------------------------------------------
  order-api:
    image: "order-api:abdbb0a"
    nodePort: 30013
    secretEnv:
      ConnectionStrings__DefaultConnection: order-sqlserver-connection

  # ---------------------------------------------------------------------------
  # Payment API (Iyzico)
  # ---------------------------------------------------------------------------
  payment-api:
    image: "payment-api:3e73105"
    nodePort: 30014
    env:
      Iyzipay__BaseUrl: "https://sandbox-api.iyzipay.com"
    secretEnv:
      Iyzipay__ApiKey: iyzico-api-key
      Iyzipay__SecretKey: iyzico-secret-key

  # ---------------------------------------------------------------------------
  # Invoice API (PDF & MinIO)
  # ---------------------------------------------------------------------------
  invoice-api:
    image: "invoice-api:3e73105"
    nodePort: 30017
    env:
      IdentityOption__Audience: "invoice.api"
      Minio__UseLocalStorage: "false"
    secretEnv:
      Minio__Endpoint: minio-endpoint
      Minio__AccessKey: minio-access-key
      Minio__SecretKey: minio-secret-key
      Minio__BucketName: minio-bucket-name
      Minio__Secure: minio-secure

  # ---------------------------------------------------------------------------
  # Notification API (Go + Gin)
  # ---------------------------------------------------------------------------
  notification-api:
    image: "notification-api:3e73105"
    nodePort: 30019
    env:
      GIN_MODE: "release"
      Minio__UseLocalStorage: "false"
    secretEnv:
      Minio__Endpoint: minio-endpoint
      Minio__AccessKey: minio-access-key
      Minio__SecretKey: minio-secret-key
      Minio__BucketName: minio-bucket-name
      Minio__Secure: minio-secure
      SMTP_USERNAME: smtp-username
      SMTP_PASSWORD: smtp-password

  # ---------------------------------------------------------------------------
  # Campaign API (SQL Server)
  # ---------------------------------------------------------------------------
  campaign-api:
    image: "campaign-api:3e73105"
    nodePort: 30016
    secretEnv:
      ConnectionStrings__SqlServer: campaign-sqlserver-connection

  # ---------------------------------------------------------------------------
  # WebUI (MVC — routes through Gateway internally)
  # ---------------------------------------------------------------------------
  webui:
    image: "webui:40bc7e5"
    nodePort: 30075
    replicas: 1
    env:
      ServiceApiSettings__IdentityBaseUri: "https://keycloak.kadiryilmaz.online/realms/GameGaraj"
      ServiceApiSettings__GatewayBaseUri: "http://gateway:8080"
      ServiceApiSettings__PhotoBaseUrl: "https://minio.kadiryilmaz.online/gamegaraj"
      APP_VERSION: "40bc7e5"
      OpenTelemetry__OtlpEndpoint: "http://192.168.1.56:4317"
      ObservabilitySettings__ElasticSearchUri: "http://192.168.1.56:9201"
      ObservabilitySettings__Services__Gateway: "http://gateway:8080"
      ObservabilitySettings__Services__CatalogAPI: "http://catalog-api:8080"
      ObservabilitySettings__Services__BasketAPI: "http://basket-api:8080"
      ObservabilitySettings__Services__OrderAPI: "http://order-api:8080"
      ObservabilitySettings__Services__PaymentAPI: "http://payment-api:8080"
      ObservabilitySettings__Services__InvoiceAPI: "http://invoice-api:8080"
      ObservabilitySettings__Services__ReviewAPI: "http://review-api:8080"
      ObservabilitySettings__Services__CampaignAPI: "http://campaign-api:8080"
      ObservabilitySettings__Services__PhotoStockAPI: "http://photostock-api:8080"
    secretEnv:
      ConnectionStrings__Redis: redis-connection

# =============================================================================
# Kubernetes Secret (gamegaraj-secrets)
# =============================================================================
# Secrets are managed EXTERNALLY via the k3s-secret-sync.yml GitHub Actions
# workflow (kubectl create secret). ArgoCD does NOT manage secrets.
# The microservice deployments reference gamegaraj-secrets by name.
# =============================================================================


# =============================================================================
# ConfigMaps
# =============================================================================
configMaps:
  # Optional init-dbs SQL ConfigMap
  initdbs:
    enabled: false
    data: ""

# =============================================================================
# Monitoring (Prometheus, Grafana & Jaeger)
# =============================================================================
monitoring:
  enabled: true
  prometheus:
    image: "prom/prometheus:v2.51.0"
  grafana:
    image: "grafana/grafana:10.4.1"
    nodePort: 30300
  jaeger:
    image: "jaegertracing/all-in-one:1.56"
    nodePort: 30686

