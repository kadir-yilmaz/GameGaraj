apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccountName }}
  namespace: {{ .Values.dashboardNamespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.serviceAccountName }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccountName }}
    namespace: {{ .Values.dashboardNamespace }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.serviceAccountName }}-token
  namespace: {{ .Values.dashboardNamespace }}
  annotations:
    kubernetes.io/service-account.name: {{ .Values.serviceAccountName }}
type: kubernetes.io/service-account-token
