name: K3s Config Sync

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: Kubernetes namespace to sync
        required: true
        default: default
      restart_deployments:
        description: Restart deployments after applying manifests
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/k3s-config-sync.yml"
      - "helm/**"

concurrency:
  group: gamegaraj-k3s-config-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Config And Redeploy
    runs-on: [self-hosted, Linux, X64]

    env:
      KUBECONFIG: /home/kadirserver/.kube/config
      NAMESPACE: ${{ github.event.inputs.namespace || 'default' }}
      RESTART_DEPLOYMENTS: ${{ github.event.inputs.restart_deployments || 'true' }}
      K3S_SECRETS_JSON: ${{ secrets.K3S_SECRETS_JSON }}
      K3S_SECRETS: ${{ secrets.K3S_SECRETS }}

      KEYCLOAK_ADMIN_USERNAME: ${{ secrets.KEYCLOAK_ADMIN_USERNAME }}
      KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      IYZICO_API_KEY: ${{ secrets.IYZICO_API_KEY }}
      IYZICO_SECRET_KEY: ${{ secrets.IYZICO_SECRET_KEY }}

      RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
      REDIS_CONNECTION: ${{ secrets.REDIS_CONNECTION }}
      CATALOG_POSTGRES_CONNECTION: ${{ secrets.CATALOG_POSTGRES_CONNECTION }}
      DISCOUNT_POSTGRES_CONNECTION: ${{ secrets.DISCOUNT_POSTGRES_CONNECTION }}
      ORDER_SQLSERVER_CONNECTION: ${{ secrets.ORDER_SQLSERVER_CONNECTION }}
      CAMPAIGN_SQLSERVER_CONNECTION: ${{ secrets.CAMPAIGN_SQLSERVER_CONNECTION }}

      MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      MINIO_BUCKET_NAME: ${{ secrets.MINIO_BUCKET_NAME }}
      MINIO_SECURE: ${{ secrets.MINIO_SECURE }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Cluster
        run: |
          set -euo pipefail

          kubectl version --client
          kubectl get nodes -o wide

          if ! command -v helm >/dev/null 2>&1; then
            echo "helm is missing. Installing Helm on the self-hosted runner..."
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 -o /tmp/get_helm.sh
            chmod 700 /tmp/get_helm.sh
            /tmp/get_helm.sh
          fi
          helm version

      - name: Load Bundled K3s Secrets
        run: |
          set -euo pipefail

          if [ -n "${K3S_SECRETS_JSON:-}" ]; then
            python3 - <<'PY'
          import json
          import os
          import re
          import sys

          key_pattern = re.compile(r"^[A-Z_][A-Z0-9_]*$")
          github_env = os.environ["GITHUB_ENV"]

          try:
              values = json.loads(os.environ["K3S_SECRETS_JSON"])
          except json.JSONDecodeError as exc:
              print(f"::error::K3S_SECRETS_JSON is not valid JSON: {exc}", file=sys.stderr)
              sys.exit(1)

          if not isinstance(values, dict):
              print("::error::K3S_SECRETS_JSON must be a JSON object.", file=sys.stderr)
              sys.exit(1)

          with open(github_env, "a", encoding="utf-8") as env_file:
              for key, value in values.items():
                  if not key_pattern.match(key):
                      print(f"::error::Invalid key in K3S_SECRETS_JSON: {key}", file=sys.stderr)
                      sys.exit(1)

                  if isinstance(value, bool):
                      value = str(value).lower()
                  elif isinstance(value, (int, float)):
                      value = str(value)
                  elif value is None:
                      value = ""
                  elif not isinstance(value, str):
                      print(f"::error::Value for {key} must be a string, number, boolean, or null.", file=sys.stderr)
                      sys.exit(1)

                  print(f"::add-mask::{value}")
                  env_file.write(f"{key}<<__{key}_EOF__\n{value}\n__{key}_EOF__\n")
          PY
            exit 0
          fi

          if [ -z "${K3S_SECRETS:-}" ]; then
            echo "K3S_SECRETS_JSON and K3S_SECRETS are empty. Falling back to individual GitHub secrets."
            exit 0
          fi

          secrets_file="$(mktemp)"
          printf '%s\n' "$K3S_SECRETS" | sed 's/\r$//' > "$secrets_file"

          mapfile -t lines < "$secrets_file"
          index=0

          while [ "$index" -lt "${#lines[@]}" ]; do
            key="${lines[$index]}"
            index=$((index + 1))

            if [ -z "$key" ]; then
              continue
            fi

            if ! [[ "$key" =~ ^[A-Z_][A-Z0-9_]*$ ]]; then
              echo "::error::Invalid key in K3S_SECRETS: ${key}"
              exit 1
            fi

            if [ "$index" -ge "${#lines[@]}" ]; then
              echo "::error::Missing value for ${key} in K3S_SECRETS"
              exit 1
            fi

            value="${lines[$index]}"
            index=$((index + 1))

            echo "::add-mask::${value}"
            {
              echo "${key}<<__${key}_EOF__"
              echo "${value}"
              echo "__${key}_EOF__"
            } >> "$GITHUB_ENV"
          done

      - name: Validate Required Secrets
        run: |
          set -euo pipefail

          required=(
            KEYCLOAK_ADMIN_USERNAME
            KEYCLOAK_ADMIN_PASSWORD
            ADMIN_EMAIL
            ADMIN_PASSWORD
            GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET
            SMTP_USERNAME
            SMTP_PASSWORD
            IYZICO_API_KEY
            IYZICO_SECRET_KEY
            RABBITMQ_URL
            REDIS_CONNECTION
            CATALOG_POSTGRES_CONNECTION
            DISCOUNT_POSTGRES_CONNECTION
            ORDER_SQLSERVER_CONNECTION
            CAMPAIGN_SQLSERVER_CONNECTION
            MINIO_ENDPOINT
            MINIO_ACCESS_KEY
            MINIO_SECRET_KEY
            MINIO_BUCKET_NAME
            MINIO_SECURE
          )

          missing=0
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub secret: ${name}"
              missing=1
            fi
          done

          exit "$missing"

      - name: Ensure Namespace
        run: |
          set -euo pipefail
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Adopt Existing Resources for Helm
        run: |
          set -euo pipefail
          # Delete old kubectl-created resources that lack Helm ownership labels.
          # Helm will recreate them with proper annotations on upgrade.
          kubectl -n "$NAMESPACE" delete secret gamegaraj-secrets --ignore-not-found
          kubectl -n "$NAMESPACE" delete configmap gamegaraj-keycloak-realm --ignore-not-found
          kubectl -n "$NAMESPACE" delete configmap gamegaraj-redis-sentinel --ignore-not-found
          kubectl -n "$NAMESPACE" delete configmap gamegaraj-initdbs --ignore-not-found

      - name: Helm Upgrade
        run: |
          set -euo pipefail

          short_sha="$(git rev-parse --short HEAD)"

          helm upgrade --install gamegaraj ./helm/gamegaraj \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --set secrets.keycloak-admin-username="$KEYCLOAK_ADMIN_USERNAME" \
            --set secrets.keycloak-admin-password="$KEYCLOAK_ADMIN_PASSWORD" \
            --set secrets.admin-email="$ADMIN_EMAIL" \
            --set secrets.admin-password="$ADMIN_PASSWORD" \
            --set secrets.google-client-id="$GOOGLE_CLIENT_ID" \
            --set secrets.google-client-secret="$GOOGLE_CLIENT_SECRET" \
            --set secrets.smtp-username="$SMTP_USERNAME" \
            --set secrets.smtp-password="$SMTP_PASSWORD" \
            --set secrets.iyzico-api-key="$IYZICO_API_KEY" \
            --set secrets.iyzico-secret-key="$IYZICO_SECRET_KEY" \
            --set secrets.rabbitmq-url="$RABBITMQ_URL" \
            --set secrets.redis-connection="$REDIS_CONNECTION" \
            --set secrets.catalog-postgres-connection="$CATALOG_POSTGRES_CONNECTION" \
            --set secrets.discount-postgres-connection="$DISCOUNT_POSTGRES_CONNECTION" \
            --set secrets.order-sqlserver-connection="$ORDER_SQLSERVER_CONNECTION" \
            --set secrets.campaign-sqlserver-connection="$CAMPAIGN_SQLSERVER_CONNECTION" \
            --set secrets.minio-endpoint="$MINIO_ENDPOINT" \
            --set secrets.minio-access-key="$MINIO_ACCESS_KEY" \
            --set secrets.minio-secret-key="$MINIO_SECRET_KEY" \
            --set secrets.minio-bucket-name="$MINIO_BUCKET_NAME" \
            --set secrets.minio-secure="$MINIO_SECURE" \
            --set services.webui.env.APP_VERSION="$short_sha" \
            --set-file configMaps.realm.data.realm-init\\.json=helm/gamegaraj/config/realm-init.json \
            --set-file configMaps.redisSentinel.sentinel1=helm/gamegaraj/config/sentinel1.conf \
            --set-file configMaps.redisSentinel.sentinel2=helm/gamegaraj/config/sentinel2.conf \
            --set-file configMaps.redisSentinel.sentinel3=helm/gamegaraj/config/sentinel3.conf \
            --wait --timeout 180s

      - name: Restart Deployments
        if: ${{ env.RESTART_DEPLOYMENTS == 'true' }}
        run: |
          set -euo pipefail
          kubectl -n "$NAMESPACE" rollout restart deployment

      - name: Wait For Rollouts
        if: ${{ env.RESTART_DEPLOYMENTS == 'true' }}
        run: |
          set -euo pipefail

          for deployment in $(kubectl -n "$NAMESPACE" get deploy -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}'); do
            kubectl -n "$NAMESPACE" rollout status "deployment/${deployment}" --timeout=180s
          done

      - name: Post Sync Checks
        run: |
          set -euo pipefail

          kubectl -n "$NAMESPACE" get configmap gamegaraj-keycloak-realm gamegaraj-redis-sentinel
          kubectl -n "$NAMESPACE" get configmap gamegaraj-initdbs || true
          kubectl -n "$NAMESPACE" get secret gamegaraj-secrets
          kubectl -n "$NAMESPACE" get deployments -o wide
          kubectl -n "$NAMESPACE" get pods -o wide
          kubectl -n "$NAMESPACE" get services -o wide
