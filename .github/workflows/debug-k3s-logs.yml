name: Debug K3s Logs

on:
  workflow_dispatch:

jobs:
  debug:
    name: Fetch photostock-api Pod Logs
    runs-on: [self-hosted, Linux, X64]

    env:
      KUBECONFIG: /home/kadirserver/.kube/config

    steps:
      - name: Get Pods
        run: |
          echo "=== All Pods in default namespace ==="
          kubectl get pods -o wide
          
      - name: Get photostock-api Logs
        run: |
          echo "=== Logs for photostock-api ==="
          kubectl logs -n default -l app=photostock-api --tail=150 || echo "Failed to fetch logs by label"
          
      - name: Describe photostock-api deployment
        run: |
          echo "=== Describe photostock-api deployment ==="
          kubectl describe deployment photostock-api -n default || echo "Failed to describe deployment"
