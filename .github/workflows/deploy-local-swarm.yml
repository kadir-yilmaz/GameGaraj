name: Local Swarm Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy To Local Docker Swarm
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4

    - name: Verify Tooling & Init Swarm
      shell: powershell
      run: |
        docker version
        $swarmState = docker info --format '{{.Swarm.LocalNodeState}}'
        if ($swarmState -ne 'active') {
          Write-Host "Initializing Docker Swarm..." -ForegroundColor Cyan
          docker swarm init
        } else {
          Write-Host "Docker Swarm is already active." -ForegroundColor Green
        }

    - name: Start Compose Infrastructure
      shell: powershell
      run: |
        docker compose -f docker-compose.yml up -d
        docker ps --format "table {{.Names}}\t{{.Status}}" | Select-String "gamegaraj-"

    - name: Build Application Images
      shell: powershell
      run: |
        docker compose -f docker-compose.build.yml build
        if ($LASTEXITCODE -ne 0) {
          throw "Docker build failed"
        }

    - name: Deploy Application Stack
      shell: powershell
      run: |
        $shortSha = if ($env:GITHUB_SHA) { $env:GITHUB_SHA.Substring(0,7) } else { "Unknown" }
        (Get-Content swarm/webui.yaml) -replace 'GITHUB_SHA_PLACEHOLDER', $shortSha | Set-Content swarm/webui.yaml

        Write-Host "Deploying GameGaraj stack to Docker Swarm..." -ForegroundColor Cyan
        
        docker stack deploy `
          -c swarm/gateway.yaml `
          -c swarm/catalog-api.yaml `
          -c swarm/photostock-api.yaml `
          -c swarm/basket-api.yaml `
          -c swarm/discount-api.yaml `
          -c swarm/order-api.yaml `
          -c swarm/payment-api.yaml `
          -c swarm/invoice-api.yaml `
          -c swarm/campaign-api.yaml `
          -c swarm/webui.yaml `
          gamegaraj

        if ($LASTEXITCODE -ne 0) {
          throw "Docker stack deploy failed"
        }

    - name: Wait For Services To Converge
      shell: powershell
      run: |
        Write-Host "Waiting for 15 seconds to allow services to schedule..." -ForegroundColor Yellow
        Start-Sleep -Seconds 15

    - name: Post Deploy Checks
      shell: powershell
      run: |
        docker stack ls
        docker stack services gamegaraj
        docker service ls
