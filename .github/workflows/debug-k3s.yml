name: Debug K3s Cluster

on:
  push:
    paths:
      - '.github/workflows/debug-k3s.yml'

jobs:
  debug:
    runs-on: [self-hosted, Linux, X64]
    env:
      KUBECONFIG: /home/kadirserver/.kube/config
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Diagnostics
        run: |
          {
            echo "=== WebUI Pod Details ==="
            kubectl describe pod -l app=webui
            
            echo "=== WebUI Deployments ==="
            kubectl get deployments -o wide
            
            echo "=== All Pods ==="
            kubectl get pods -o wide
            
            echo "=== Logs from WebUI (Current) ==="
            kubectl logs deployment/webui --tail=200 || true
            
            echo "=== Logs from WebUI (Previous) ==="
            kubectl logs deployment/webui --previous --tail=200 || true
          } > k3s_debug_logs.txt

      - name: Send Logs to Local Machine
        run: |
          curl -X POST --data-binary @k3s_debug_logs.txt http://192.168.1.62:9999/ || true
