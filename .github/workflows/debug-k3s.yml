name: Debug K3s Cluster

on:
  push:
    paths:
      - '.github/workflows/debug-k3s.yml'

jobs:
  debug:
    runs-on: [self-hosted, Linux, X64]
    env:
      KUBECONFIG: /home/kadirserver/.kube/config
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Diagnostics
        run: |
          {
            echo "=== CLI versions ==="
            kubectl version --client
            
            echo "=== Cluster Nodes ==="
            kubectl get nodes -o wide
            
            echo "=== All Pods ==="
            kubectl get pods -A
            
            echo "=== GameGaraj Services ==="
            kubectl get svc -n gamegaraj -o wide
            
            echo "=== GameGaraj Deployments ==="
            kubectl get deployments -n gamegaraj
            
            echo "=== Describe Failed Pods ==="
            kubectl describe pods -n gamegaraj
            
            echo "=== Logs from WebUI ==="
            kubectl logs -n gamegaraj deployment/webui --tail=100 || true
          } > k3s_debug_logs.txt

      - name: Commit and Push Logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k3s_debug_logs.txt
          git commit -m "debug: add latest k3s diagnostic logs [skip ci]" || exit 0
          git push
