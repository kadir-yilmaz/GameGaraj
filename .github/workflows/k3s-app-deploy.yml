name: K3s App Deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: Application image to build
        required: true
        default: all
        type: choice
        options:
          - all
          - gateway
          - catalog-api
          - photostock-api
          - basket-api
          - order-api
          - payment-api
          - invoice-api
          - campaign-api
          - review-api
          - webui

concurrency:
  group: gamegaraj-k3s-app-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Build Images And Update Tags
    runs-on: [self-hosted, Linux, X64]

    env:
      BUILD_SERVICE: ${{ github.event.inputs.service || 'all' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          # Use a PAT or deploy key so the automated push can trigger other workflows if needed
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect Changed Services
        id: filter
        run: |
          set -euo pipefail

          TRIGGER_TYPE="${{ github.event_name }}"
          MANUAL_SERVICE="${{ github.event.inputs.service }}"
          
          build_gateway=false
          build_catalog_api=false
          build_photostock_api=false
          build_basket_api=false
          build_order_api=false
          build_payment_api=false
          build_invoice_api=false
          build_campaign_api=false
          build_review_api=false
          build_webui=false

          if [ "$TRIGGER_TYPE" = "workflow_dispatch" ]; then
            echo "Workflow manually triggered for service: $MANUAL_SERVICE"
            if [ "$MANUAL_SERVICE" = "all" ] || [ -z "$MANUAL_SERVICE" ]; then
              build_gateway=true
              build_catalog_api=true
              build_photostock_api=true
              build_basket_api=true
              build_order_api=true
              build_payment_api=true
              build_invoice_api=true
              build_campaign_api=true
              build_review_api=true
              build_webui=true
            else
              # Enable only the manually selected service
              eval "build_${MANUAL_SERVICE//-/_}=true"
            fi
          else
            # Push trigger. Detect changes via git.
            BASE_COMMIT="${{ github.event.before }}"
            if [ -z "$BASE_COMMIT" ] || [ "$BASE_COMMIT" = "0000000000000000000000000000000000000000" ]; then
              BASE_COMMIT="HEAD~1"
            fi

            echo "Comparing HEAD against $BASE_COMMIT..."
            CHANGED_FILES=$(git diff --name-only "$BASE_COMMIT" HEAD || git diff --name-only HEAD~1 HEAD || true)
            
            echo "Changed files:"
            echo "$CHANGED_FILES"
            echo "----------------------------------------"

            if echo "$CHANGED_FILES" | grep -E "^(GameGaraj\.Shared/|\.github/workflows/k3s-app-deploy\.yml|docker-compose\.build\.yml)" >/dev/null; then
              echo "Shared code or workflow file changed. Rebuilding ALL services."
              build_gateway=true
              build_catalog_api=true
              build_photostock_api=true
              build_basket_api=true
              build_order_api=true
              build_payment_api=true
              build_invoice_api=true
              build_campaign_api=true
              build_review_api=true
              build_webui=true
            else
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Gateway/" >/dev/null; then build_gateway=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Catalog\.API/" >/dev/null; then build_catalog_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.PhotoStock\.API/" >/dev/null; then build_photostock_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Basket\.API/" >/dev/null; then build_basket_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Order\." >/dev/null; then build_order_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Payment\.API/" >/dev/null; then build_payment_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Invoice\.API/" >/dev/null; then build_invoice_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Campaign\.API/" >/dev/null; then build_campaign_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Review\.API/" >/dev/null; then build_review_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.WebUI/" >/dev/null; then build_webui=true; fi
            fi
          fi

          echo "build_gateway=$build_gateway" >> "$GITHUB_OUTPUT"
          echo "build_catalog_api=$build_catalog_api" >> "$GITHUB_OUTPUT"
          echo "build_photostock_api=$build_photostock_api" >> "$GITHUB_OUTPUT"
          echo "build_basket_api=$build_basket_api" >> "$GITHUB_OUTPUT"
          echo "build_order_api=$build_order_api" >> "$GITHUB_OUTPUT"
          echo "build_payment_api=$build_payment_api" >> "$GITHUB_OUTPUT"
          echo "build_invoice_api=$build_invoice_api" >> "$GITHUB_OUTPUT"
          echo "build_campaign_api=$build_campaign_api" >> "$GITHUB_OUTPUT"
          echo "build_review_api=$build_review_api" >> "$GITHUB_OUTPUT"
          echo "build_webui=$build_webui" >> "$GITHUB_OUTPUT"

          echo "Decisions:"
          echo " - Gateway: $build_gateway"
          echo " - Catalog API: $build_catalog_api"
          echo " - PhotoStock API: $build_photostock_api"
          echo " - Basket API: $build_basket_api"
          echo " - Order API: $build_order_api"
          echo " - Payment API: $build_payment_api"
          echo " - Invoice API: $build_invoice_api"
          echo " - Campaign API: $build_campaign_api"
          echo " - Review API: $build_review_api"
          echo " - WebUI: $build_webui"

      - name: Verify Tooling
        run: |
          set -euo pipefail
          docker version

      - name: Build Application Images
        run: |
          set -euo pipefail

          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "Image tag: $SHORT_SHA"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"

          SERVICES_TO_BUILD=""
          if [ "${{ steps.filter.outputs.build_gateway }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD gateway"; fi
          if [ "${{ steps.filter.outputs.build_catalog_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD catalog-api"; fi
          if [ "${{ steps.filter.outputs.build_photostock_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD photostock-api"; fi
          if [ "${{ steps.filter.outputs.build_basket_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD basket-api"; fi
          if [ "${{ steps.filter.outputs.build_order_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD order-api"; fi
          if [ "${{ steps.filter.outputs.build_payment_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD payment-api"; fi
          if [ "${{ steps.filter.outputs.build_invoice_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD invoice-api"; fi
          if [ "${{ steps.filter.outputs.build_campaign_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD campaign-api"; fi
          if [ "${{ steps.filter.outputs.build_review_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD review-api"; fi
          if [ "${{ steps.filter.outputs.build_webui }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD webui"; fi

          if [ -z "$SERVICES_TO_BUILD" ]; then
            echo "No services changed or selected. Skipping docker build."
            echo "SKIP_TAG_UPDATE=true" >> "$GITHUB_ENV"
          else
            echo "Building services: $SERVICES_TO_BUILD"
            IMAGE_TAG="$SHORT_SHA" docker compose -f docker-compose.build.yml build $SERVICES_TO_BUILD
            echo "SERVICES_BUILT=$SERVICES_TO_BUILD" >> "$GITHUB_ENV"
          fi

      - name: Update Image Tags in values.yaml
        if: ${{ env.SKIP_TAG_UPDATE != 'true' }}
        run: |
          set -euo pipefail

          VALUES_FILE="helm/gamegaraj/values.yaml"
          SHORT_SHA="${SHORT_SHA}"

          echo "Updating image tags in $VALUES_FILE to $SHORT_SHA..."

          # Map docker-compose service names to Helm values.yaml service keys
          declare -A SERVICE_MAP=(
            ["gateway"]="gateway"
            ["catalog-api"]="catalog-api"
            ["photostock-api"]="photostock-api"
            ["basket-api"]="basket-api"
            ["order-api"]="order-api"
            ["payment-api"]="payment-api"
            ["invoice-api"]="invoice-api"
            ["campaign-api"]="campaign-api"
            ["review-api"]="review-api"
            ["webui"]="webui"
          )

          for svc in $SERVICES_BUILT; do
            helm_key="${SERVICE_MAP[$svc]:-}"
            if [ -z "$helm_key" ]; then
              echo "WARNING: No Helm key mapping for service '$svc', skipping."
              continue
            fi

            # Replace the image tag for this service in values.yaml
            # Pattern: image: [optional quote]<service-name>:<any-tag>[optional quote]  →  image: "<service-name>:<SHORT_SHA>"
            sed -i -E "s|image: \"?${svc}:[^\"]*\"?|image: \"${svc}:${SHORT_SHA}\"|g" "$VALUES_FILE"
            echo "  Updated: ${svc} → ${svc}:${SHORT_SHA}"
          done

          # Also update APP_VERSION for webui if it was built
          if echo "$SERVICES_BUILT" | grep -q "webui"; then
            sed -i "s|APP_VERSION:.*|APP_VERSION: \"${SHORT_SHA}\"|" "$VALUES_FILE"
            echo "  Updated: APP_VERSION → ${SHORT_SHA}"
          fi

          echo ""
          echo "Updated values.yaml image entries:"
          grep -E "^\s+image:" "$VALUES_FILE"

      - name: Commit and Push Tag Updates
        if: ${{ env.SKIP_TAG_UPDATE != 'true' }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add helm/gamegaraj/values.yaml
          
          # Check if there are actual changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit. Tags may already be up to date."
            exit 0
          fi

          git commit -m "ci: update image tags to ${SHORT_SHA} [skip ci]"
          
          # Try to push, pull with rebase if remote has new commits
          for i in {1..3}; do
            echo "Push attempt $i..."
            if git push; then
              echo "Push successful!"
              break
            fi
            echo "Push failed (possibly due to concurrent remote changes). Pulling latest changes and retrying..."
            git pull --rebase origin main || git pull --rebase origin master || true
          done

          echo ""
          echo "=============================================="
          echo "  Image tags committed and pushed."
          echo "  ArgoCD will detect this change and deploy."
          echo "=============================================="
