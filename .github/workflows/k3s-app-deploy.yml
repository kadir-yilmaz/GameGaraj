name: K3s App Deploy

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: Kubernetes namespace to deploy into
        required: true
        default: default
      install_k3s_if_missing:
        description: Install k3s if it is missing on the self-hosted runner
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      service:
        description: Application image to build
        required: true
        default: all
        type: choice
        options:
          - all
          - gateway
          - catalog-api
          - photostock-api
          - basket-api
          - discount-api
          - order-api
          - payment-api
          - invoice-api
          - campaign-api
          - webui

  push:
    branches:
      - main
      - master
    paths:
      - "GameGaraj.Gateway/**"
      - "GameGaraj.Catalog.API/**"
      - "GameGaraj.PhotoStock.API/**"
      - "GameGaraj.Basket.API/**"
      - "GameGaraj.Discount.API/**"
      - "GameGaraj.Order.API/**"
      - "GameGaraj.Order.Application/**"
      - "GameGaraj.Order.Domain/**"
      - "GameGaraj.Order.Infrastructure/**"
      - "GameGaraj.Payment.API/**"
      - "GameGaraj.Invoice.API/**"
      - "GameGaraj.Campaign.API/**"
      - "GameGaraj.WebUI/**"
      - "GameGaraj.Shared/**"
      - ".github/workflows/k3s-app-deploy.yml"
      - "docker-compose.build.yml"

concurrency:
  group: gamegaraj-k3s-app-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build Images And Deploy
    runs-on: [self-hosted, Linux, X64]

    env:
      KUBECONFIG: /home/kadirserver/.kube/config
      NAMESPACE: ${{ github.event.inputs.namespace || 'default' }}
      BUILD_SERVICE: ${{ github.event.inputs.service || 'all' }}
      K3S_SECRETS_JSON: ${{ secrets.K3S_SECRETS_JSON }}
      K3S_SECRETS: ${{ secrets.K3S_SECRETS }}

      KEYCLOAK_ADMIN_USERNAME: ${{ secrets.KEYCLOAK_ADMIN_USERNAME }}
      KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      IYZICO_API_KEY: ${{ secrets.IYZICO_API_KEY }}
      IYZICO_SECRET_KEY: ${{ secrets.IYZICO_SECRET_KEY }}

      RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
      REDIS_CONNECTION: ${{ secrets.REDIS_CONNECTION }}
      CATALOG_POSTGRES_CONNECTION: ${{ secrets.CATALOG_POSTGRES_CONNECTION }}
      DISCOUNT_POSTGRES_CONNECTION: ${{ secrets.DISCOUNT_POSTGRES_CONNECTION }}
      ORDER_SQLSERVER_CONNECTION: ${{ secrets.ORDER_SQLSERVER_CONNECTION }}
      CAMPAIGN_SQLSERVER_CONNECTION: ${{ secrets.CAMPAIGN_SQLSERVER_CONNECTION }}

      MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      MINIO_BUCKET_NAME: ${{ secrets.MINIO_BUCKET_NAME }}
      MINIO_SECURE: ${{ secrets.MINIO_SECURE }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect Changed Services
        id: filter
        run: |
          set -euo pipefail

          TRIGGER_TYPE="${{ github.event_name }}"
          MANUAL_SERVICE="${{ github.event.inputs.service }}"
          
          build_gateway=false
          build_catalog_api=false
          build_photostock_api=false
          build_basket_api=false
          build_discount_api=false
          build_order_api=false
          build_payment_api=false
          build_invoice_api=false
          build_campaign_api=false
          build_webui=false

          if [ "$TRIGGER_TYPE" = "workflow_dispatch" ]; then
            echo "Workflow manually triggered for service: $MANUAL_SERVICE"
            if [ "$MANUAL_SERVICE" = "all" ] || [ -z "$MANUAL_SERVICE" ]; then
              build_gateway=true
              build_catalog_api=true
              build_photostock_api=true
              build_basket_api=true
              build_discount_api=true
              build_order_api=true
              build_payment_api=true
              build_invoice_api=true
              build_campaign_api=true
              build_webui=true
            else
              # Enable only the manually selected service
              eval "build_${MANUAL_SERVICE//-/_}=true"
            fi
          else
            # Push trigger. Detect changes via git.
            BASE_COMMIT="${{ github.event.before }}"
            if [ -z "$BASE_COMMIT" ] || [ "$BASE_COMMIT" = "0000000000000000000000000000000000000000" ]; then
              BASE_COMMIT="HEAD~1"
            fi

            echo "Comparing HEAD against $BASE_COMMIT..."
            CHANGED_FILES=$(git diff --name-only "$BASE_COMMIT" HEAD || git diff --name-only HEAD~1 HEAD || true)
            
            echo "Changed files:"
            echo "$CHANGED_FILES"
            echo "----------------------------------------"

            if echo "$CHANGED_FILES" | grep -E "^(GameGaraj\.Shared/|\.github/workflows/k3s-app-deploy\.yml|docker-compose\.build\.yml)" >/dev/null; then
              echo "Shared code or workflow file changed. Rebuilding ALL services."
              build_gateway=true
              build_catalog_api=true
              build_photostock_api=true
              build_basket_api=true
              build_discount_api=true
              build_order_api=true
              build_payment_api=true
              build_invoice_api=true
              build_campaign_api=true
              build_webui=true
            else
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Gateway/" >/dev/null; then build_gateway=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Catalog\.API/" >/dev/null; then build_catalog_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.PhotoStock\.API/" >/dev/null; then build_photostock_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Basket\.API/" >/dev/null; then build_basket_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Discount\.API/" >/dev/null; then build_discount_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Order\." >/dev/null; then build_order_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Payment\.API/" >/dev/null; then build_payment_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Invoice\.API/" >/dev/null; then build_invoice_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.Campaign\.API/" >/dev/null; then build_campaign_api=true; fi
              if echo "$CHANGED_FILES" | grep -E "^GameGaraj\.WebUI/" >/dev/null; then build_webui=true; fi
            fi
          fi

          echo "build_gateway=$build_gateway" >> "$GITHUB_OUTPUT"
          echo "build_catalog_api=$build_catalog_api" >> "$GITHUB_OUTPUT"
          echo "build_photostock_api=$build_photostock_api" >> "$GITHUB_OUTPUT"
          echo "build_basket_api=$build_basket_api" >> "$GITHUB_OUTPUT"
          echo "build_discount_api=$build_discount_api" >> "$GITHUB_OUTPUT"
          echo "build_order_api=$build_order_api" >> "$GITHUB_OUTPUT"
          echo "build_payment_api=$build_payment_api" >> "$GITHUB_OUTPUT"
          echo "build_invoice_api=$build_invoice_api" >> "$GITHUB_OUTPUT"
          echo "build_campaign_api=$build_campaign_api" >> "$GITHUB_OUTPUT"
          echo "build_webui=$build_webui" >> "$GITHUB_OUTPUT"

          echo "Decisions:"
          echo " - Gateway: $build_gateway"
          echo " - Catalog API: $build_catalog_api"
          echo " - PhotoStock API: $build_photostock_api"
          echo " - Basket API: $build_basket_api"
          echo " - Discount API: $build_discount_api"
          echo " - Order API: $build_order_api"
          echo " - Payment API: $build_payment_api"
          echo " - Invoice API: $build_invoice_api"
          echo " - Campaign API: $build_campaign_api"
          echo " - WebUI: $build_webui"

      - name: Ensure K3s Exists
        if: ${{ github.event.inputs.install_k3s_if_missing == 'true' }}
        run: |
          set -euo pipefail

          if command -v k3s >/dev/null 2>&1 && systemctl is-active --quiet k3s; then
            echo "k3s is already installed and running."
            exit 0
          fi

          curl -sfL https://get.k3s.io | sudo sh -s - --docker
          mkdir -p "$HOME/.kube"
          sudo cp /etc/rancher/k3s/k3s.yaml "$HOME/.kube/config"
          sudo chown "$USER:$USER" "$HOME/.kube/config"

      - name: Verify Tooling
        run: |
          set -euo pipefail

          docker version
          kubectl version --client
          kubectl get nodes -o wide

          if ! command -v helm >/dev/null 2>&1; then
            echo "helm is missing. Installing Helm on the self-hosted runner..."
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 -o /tmp/get_helm.sh
            chmod 700 /tmp/get_helm.sh
            /tmp/get_helm.sh
          fi
          helm version

      - name: Load Bundled K3s Secrets
        run: |
          set -euo pipefail

          if [ -n "${K3S_SECRETS_JSON:-}" ]; then
            python3 - <<'PY'
          import json
          import os
          import re
          import sys

          key_pattern = re.compile(r"^[A-Z_][A-Z0-9_]*$")
          github_env = os.environ["GITHUB_ENV"]

          try:
              values = json.loads(os.environ["K3S_SECRETS_JSON"])
          except json.JSONDecodeError as exc:
              print(f"::error::K3S_SECRETS_JSON is not valid JSON: {exc}", file=sys.stderr)
              sys.exit(1)

          if not isinstance(values, dict):
              print("::error::K3S_SECRETS_JSON must be a JSON object.", file=sys.stderr)
              sys.exit(1)

          with open(github_env, "a", encoding="utf-8") as env_file:
              for key, value in values.items():
                  if not key_pattern.match(key):
                      print(f"::error::Invalid key in K3S_SECRETS_JSON: {key}", file=sys.stderr)
                      sys.exit(1)

                  if isinstance(value, bool):
                      value = str(value).lower()
                  elif isinstance(value, (int, float)):
                      value = str(value)
                  elif value is None:
                      value = ""
                  elif not isinstance(value, str):
                      print(f"::error::Value for {key} must be a string, number, boolean, or null.", file=sys.stderr)
                      sys.exit(1)

                  print(f"::add-mask::{value}")
                  env_file.write(f"{key}<<__{key}_EOF__\n{value}\n__{key}_EOF__\n")
          PY
            exit 0
          fi

          if [ -z "${K3S_SECRETS:-}" ]; then
            echo "K3S_SECRETS_JSON and K3S_SECRETS are empty. Falling back to individual GitHub secrets."
            exit 0
          fi

          secrets_file="$(mktemp)"
          printf '%s\n' "$K3S_SECRETS" | sed 's/\r$//' > "$secrets_file"

          mapfile -t lines < "$secrets_file"
          index=0

          while [ "$index" -lt "${#lines[@]}" ]; do
            key="${lines[$index]}"
            index=$((index + 1))

            if [ -z "$key" ]; then
              continue
            fi

            if ! [[ "$key" =~ ^[A-Z_][A-Z0-9_]*$ ]]; then
              echo "::error::Invalid key in K3S_SECRETS: ${key}"
              exit 1
            fi

            if [ "$index" -ge "${#lines[@]}" ]; then
              echo "::error::Missing value for ${key} in K3S_SECRETS"
              exit 1
            fi

            value="${lines[$index]}"
            index=$((index + 1))

            echo "::add-mask::${value}"
            {
              echo "${key}<<__${key}_EOF__"
              echo "${value}"
              echo "__${key}_EOF__"
            } >> "$GITHUB_ENV"
          done

      - name: Validate Required Secrets
        run: |
          set -euo pipefail

          required=(
            KEYCLOAK_ADMIN_USERNAME
            KEYCLOAK_ADMIN_PASSWORD
            ADMIN_EMAIL
            ADMIN_PASSWORD
            GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET
            SMTP_USERNAME
            SMTP_PASSWORD
            IYZICO_API_KEY
            IYZICO_SECRET_KEY
            RABBITMQ_URL
            REDIS_CONNECTION
            CATALOG_POSTGRES_CONNECTION
            DISCOUNT_POSTGRES_CONNECTION
            ORDER_SQLSERVER_CONNECTION
            CAMPAIGN_SQLSERVER_CONNECTION
            MINIO_ENDPOINT
            MINIO_ACCESS_KEY
            MINIO_SECRET_KEY
            MINIO_BUCKET_NAME
            MINIO_SECURE
          )

          missing=0
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub secret: ${name}"
              missing=1
            fi
          done

          exit "$missing"

      - name: Ensure Namespace
        run: |
          set -euo pipefail
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -



      - name: Build Application Images
        run: |
          set -euo pipefail

          SERVICES_TO_BUILD=""
          if [ "${{ steps.filter.outputs.build_gateway }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD gateway"; fi
          if [ "${{ steps.filter.outputs.build_catalog_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD catalog-api"; fi
          if [ "${{ steps.filter.outputs.build_photostock_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD photostock-api"; fi
          if [ "${{ steps.filter.outputs.build_basket_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD basket-api"; fi
          if [ "${{ steps.filter.outputs.build_discount_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD discount-api"; fi
          if [ "${{ steps.filter.outputs.build_order_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD order-api"; fi
          if [ "${{ steps.filter.outputs.build_payment_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD payment-api"; fi
          if [ "${{ steps.filter.outputs.build_invoice_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD invoice-api"; fi
          if [ "${{ steps.filter.outputs.build_campaign_api }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD campaign-api"; fi
          if [ "${{ steps.filter.outputs.build_webui }}" = "true" ]; then SERVICES_TO_BUILD="$SERVICES_TO_BUILD webui"; fi

          if [ -z "$SERVICES_TO_BUILD" ]; then
            echo "No services changed or selected. Skipping docker build."
          else
            echo "Building services: $SERVICES_TO_BUILD"
            docker compose -f docker-compose.build.yml build $SERVICES_TO_BUILD
          fi

      - name: Helm Upgrade
        run: |
          set -euo pipefail

          # Generate values override file with secrets.
          # This avoids Helm --set/--set-string comma-parsing issues
          # that corrupt connection strings like "Server=192.168.1.56,1433".
          python3 -c 'import textwrap, sys; exec(textwrap.dedent(sys.argv[1]))' '
          import yaml, os

          secrets = {
              "keycloak-admin-username": os.environ["KEYCLOAK_ADMIN_USERNAME"],
              "keycloak-admin-password": os.environ["KEYCLOAK_ADMIN_PASSWORD"],
              "admin-email":             os.environ["ADMIN_EMAIL"],
              "admin-password":          os.environ["ADMIN_PASSWORD"],
              "google-client-id":        os.environ["GOOGLE_CLIENT_ID"],
              "google-client-secret":    os.environ["GOOGLE_CLIENT_SECRET"],
              "smtp-username":           os.environ["SMTP_USERNAME"],
              "smtp-password":           os.environ["SMTP_PASSWORD"],
              "iyzico-api-key":          os.environ["IYZICO_API_KEY"],
              "iyzico-secret-key":       os.environ["IYZICO_SECRET_KEY"],
              "rabbitmq-url":            os.environ["RABBITMQ_URL"],
              "redis-connection":        os.environ["REDIS_CONNECTION"],
              "catalog-postgres-connection":  os.environ["CATALOG_POSTGRES_CONNECTION"],
              "discount-postgres-connection": os.environ["DISCOUNT_POSTGRES_CONNECTION"],
              "order-sqlserver-connection":   os.environ["ORDER_SQLSERVER_CONNECTION"],
              "campaign-sqlserver-connection": os.environ["CAMPAIGN_SQLSERVER_CONNECTION"],
              "minio-endpoint":          os.environ["MINIO_ENDPOINT"],
              "minio-access-key":        os.environ["MINIO_ACCESS_KEY"],
              "minio-secret-key":        os.environ["MINIO_SECRET_KEY"],
              "minio-bucket-name":       os.environ["MINIO_BUCKET_NAME"],
              "minio-secure":            os.environ["MINIO_SECURE"],
          }
          with open("/tmp/values-secrets.yaml", "w") as f:
              yaml.dump({"secrets": secrets}, f, default_flow_style=False)
          '

          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "Deploying version: $SHORT_SHA"

          helm upgrade --install gamegaraj ./helm/gamegaraj \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --values /tmp/values-secrets.yaml \
            --set services.webui.env.APP_VERSION="$SHORT_SHA" \
            --timeout 300s

          rm -f /tmp/values-secrets.yaml

      - name: Restart Updated Deployments
        run: |
          set -euo pipefail

          # Restart only rebuilt services to pick up local Docker image changes
          if [ "${{ steps.filter.outputs.build_gateway }}" = "true" ]; then kubectl -n "$NAMESPACE" rollout restart deployment/gateway || true; fi
          if [ "${{ steps.filter.outputs.build_catalog_api }}" = "true" ]; then kubectl -n "$NAMESPACE" rollout restart deployment/catalog-api || true; fi
          if [ "${{ steps.filter.outputs.build_photostock_api }}" = "true" ]; then kubectl -n "$NAMESPACE" rollout restart deployment/photostock-api || true; fi
          if [ "${{ steps.filter.outputs.build_basket_api }}" = "true" ]; then kubectl -n "$NAMESPACE" rollout restart deployment/basket-api || true; fi
          if [ "${{ steps.filter.outputs.build_discount_api }}" = "true" ]; then kubectl -n "$NAMESPACE" rollout restart deployment/discount-api || true; fi
          if [ "${{ steps.filter.outputs.build_order_api }}" = "true" ]; then kubectl -n "$NAMESPACE" rollout restart deployment/order-api || true; fi
          if [ "${{ steps.filter.outputs.build_payment_api }}" = "true" ]; then kubectl -n "$NAMESPACE" rollout restart deployment/payment-api || true; fi
          if [ "${{ steps.filter.outputs.build_invoice_api }}" = "true" ]; then kubectl -n "$NAMESPACE" rollout restart deployment/invoice-api || true; fi
          if [ "${{ steps.filter.outputs.build_campaign_api }}" = "true" ]; then kubectl -n "$NAMESPACE" rollout restart deployment/campaign-api || true; fi
          if [ "${{ steps.filter.outputs.build_webui }}" = "true" ]; then kubectl -n "$NAMESPACE" rollout restart deployment/webui || true; fi

      - name: Wait For Rollouts
        run: |
          set -uo pipefail
          failed=0
          for deployment in $(kubectl -n "$NAMESPACE" get deploy -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}'); do
            echo "--- Checking: $deployment ---"
            kubectl -n "$NAMESPACE" rollout status "deployment/${deployment}" --timeout=60s || { echo "WARN: $deployment did not finish in 60s"; failed=$((failed+1)); }
          done
          echo ""
          echo "=== Summary: $failed deployment(s) still rolling out ==="
          kubectl -n "$NAMESPACE" get deploy -o wide

      - name: Post Deploy Checks
        run: |
          set -euo pipefail

          kubectl -n "$NAMESPACE" get configmap gamegaraj-keycloak-realm gamegaraj-redis-sentinel
          kubectl -n "$NAMESPACE" get configmap gamegaraj-initdbs || true
          kubectl -n "$NAMESPACE" get secret gamegaraj-secrets
          kubectl -n "$NAMESPACE" get deployments -o wide
          kubectl -n "$NAMESPACE" get pods -o wide
          kubectl -n "$NAMESPACE" get services -o wide
