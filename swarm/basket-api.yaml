version: "3.8"

services:
  basket-api:
    image: basket-api:latest
    labels:
      - "com.docker.compose.project=gamegaraj_swarm"
    ports:
      - "31011:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RabbitMQUrl=host.docker.internal
      - IdentityOption__Authority=http://host.docker.internal:8080/realms/GameGaraj
      - ElasticSearchSettings__Uri=http://host.docker.internal:9201
      - ConnectionStrings__Redis=host.docker.internal:6380
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
