version: "3.8"

services:
  gateway:
    image: gateway:latest
    ports:
      - "31000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RabbitMQUrl=host.docker.internal
      - IdentityOption__Authority=http://host.docker.internal:8080/realms/GameGaraj
      - ElasticSearchSettings__Uri=http://host.docker.internal:9201
      - ReverseProxy__Clusters__basket.cluster__Destinations__destination1__Address=http://basket-api:8080
      - ReverseProxy__Clusters__catalog.cluster__Destinations__destination1__Address=http://catalog-api:8080
      - ReverseProxy__Clusters__photostock.cluster__Destinations__destination1__Address=http://photostock-api:8080
      - ReverseProxy__Clusters__payment.cluster__Destinations__destination1__Address=http://payment-api:8080
      - IdentityOption__Address=http://host.docker.internal:8080/realms/GameGaraj
      - IdentityOption__Issuer=http://host.docker.internal:8080/realms/GameGaraj
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
