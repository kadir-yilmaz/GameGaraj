apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  labels:
    app: payment-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      containers:
      - name: payment-api
        image: payment-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: RabbitMQUrl
          value: "host.docker.internal"
        - name: IdentityOption__Authority
          value: "http://host.docker.internal:8080/realms/GameGaraj"
        - name: ElasticSearchSettings__Uri
          value: "http://host.docker.internal:9201"
        - name: Iyzipay__ApiKey
          valueFrom:
            secretKeyRef:
              name: gamegaraj-secrets
              key: iyzico-api-key
        - name: Iyzipay__SecretKey
          valueFrom:
            secretKeyRef:
              name: gamegaraj-secrets
              key: iyzico-secret-key
---
apiVersion: v1
kind: Service
metadata:
  name: payment-api
spec:
  type: NodePort
  selector:
    app: payment-api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30014
