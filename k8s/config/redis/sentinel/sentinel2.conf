port 26379

# mymaster adlı servisi izle
# redis-master:6379 adresindeki Redis'i master olarak kabul et
# quorum = 2 → 3 sentinel'den 2'si "master düştü" derse failover başlar
sentinel monitor mymaster redis-master 6379 2

# 5 saniye boyunca master'dan yanıt gelmezse "düştü" say
sentinel down-after-milliseconds mymaster 5000

# Failover işlemi 10 saniyede tamamlanmazsa tekrar dene
sentinel failover-timeout mymaster 10000

# Failover sonrası replica'lar yeni master'dan tek tek sync alsın
sentinel parallel-syncs mymaster 1

# Docker container adlarını çözümleyebilmesi için gerekli
sentinel resolve-hostnames yes
sentinel announce-hostnames yes
