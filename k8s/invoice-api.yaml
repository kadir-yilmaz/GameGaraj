apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoice-api
  labels:
    app: invoice-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: invoice-api
  template:
    metadata:
      labels:
        app: invoice-api
    spec:
      containers:
      - name: invoice-api
        image: invoice-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: RabbitMQUrl
          value: "host.docker.internal"
        - name: IdentityOption__Authority
          value: "http://host.docker.internal:8080/realms/GameGaraj"
        - name: ElasticSearchSettings__Uri
          value: "http://host.docker.internal:9201"
---
apiVersion: v1
kind: Service
metadata:
  name: invoice-api
spec:
  type: NodePort
  selector:
    app: invoice-api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30017
