apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: RabbitMQUrl
          value: "host.docker.internal"
        - name: IdentityOption__Authority
          value: "http://host.docker.internal:8080/realms/GameGaraj"
        - name: ElasticSearchSettings__Uri
          value: "http://host.docker.internal:9201"
        - name: ReverseProxy__Clusters__basket.cluster__Destinations__destination1__Address
          value: "http://basket-api:8080"
        - name: ReverseProxy__Clusters__catalog.cluster__Destinations__destination1__Address
          value: "http://catalog-api:8080"
        - name: ReverseProxy__Clusters__photostock.cluster__Destinations__destination1__Address
          value: "http://photostock-api:8080"
        - name: ReverseProxy__Clusters__payment.cluster__Destinations__destination1__Address
          value: "http://payment-api:8080"
        - name: IdentityOption__Address
          value: "http://host.docker.internal:8080/realms/GameGaraj"
        - name: IdentityOption__Issuer
          value: "http://host.docker.internal:8080/realms/GameGaraj"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30000
