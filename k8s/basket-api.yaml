apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-api
  labels:
    app: basket-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basket-api
  template:
    metadata:
      labels:
        app: basket-api
    spec:
      containers:
      - name: basket-api
        image: basket-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: RabbitMQUrl
          value: "host.docker.internal"
        - name: IdentityOption__Authority
          value: "http://host.docker.internal:8080/realms/GameGaraj"
        - name: ElasticSearchSettings__Uri
          value: "http://host.docker.internal:9201"
        - name: ConnectionStrings__Redis
          value: "host.docker.internal:6380"
---
apiVersion: v1
kind: Service
metadata:
  name: basket-api
spec:
  type: NodePort
  selector:
    app: basket-api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30011
